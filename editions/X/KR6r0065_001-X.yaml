body:
  text: 明雲棲袾宏輯大明性原朗禪師師諱慧朗字性原別號幻隱生於元世台州府之黃巖縣項宅母陳氏七歲患疽幾死置牀上忽不見已而求得之問其故曰頃睡中有四童子舁至此無他也翌日疽愈識者已知師為天神所祐矣既長不甘處俗乃往依永嘉樂清寶冠寺魯山東公出家後詣徑山參元叟端公端云東嶺來西嶺來師指草鞋云此是三文錢買得端云未在更道師云某甲只恁麼未審和尚作麼生端云念汝遠來放汝三十棒師乃悟其旨久之究盡底蘊既而出世鄞之五峯皇明洪武五年詔建佛會於鍾山召高行沙門師與季潭泐公與焉後住靈隱逮十寒暑無何遭無妄之災逮捕或勸師早自為計師不顧怡然詣所司未鞠即廡下說偈端坐而逝大明楚石琦禪師師諱梵琦字楚石明州象山人朱姓母張氏元元貞二年丙申六月丁巳生在襁褓有僧見而謂其父曰此兒必當振佛法照耀濁世九歲從海鹽天寧訥公受業十六為僧二十侍族祖晉翁洵公因閱楞嚴至緣見因明暗成無見不明自發則諸暗相永不能昏於此有省然於向上一著尚有滯礙元叟端和尚主徑山往參謁問如何是言發非聲色前不物叟遽云言發非聲色前不物速道速道師擬進語叟震威一喝師乃錯愕而退已而應書寫大藏之選至京師崇天門一夕聞綵樓上鼓聲豁然大悟東歸再參元叟叟笑迎曰且喜大事了畢未幾出世海鹽之福臻至元乙亥遷杭之報國洪武元年九月十一日徵師說法於蔣山上大悅又明年七月復被召二十六日偈曰真性圓明本無生滅木馬夜鳴西方日出端坐而逝闍維齒舌數珠不壞有語錄二十卷及西齋淨土詩行世大明空谷隆禪師師諱景隆字祖庭號空谷姑蘇洞庭山陳氏子父月潭居士母金氏生於洪武癸酉七月十二日為童時不茹葷趺坐若禪定永樂壬辰從弁山白蓮懶雲和尚受學參禪雖家居而湖海禪伯如古拙和尚輩靡不參謁庚子出家虎丘宣德二年詣杭州昭慶受戒遂依師住靈隱七年往天目禮祖塔憩錫一載刻苦參究忽有省因造懶雲剖露雲印可之懶雲臨濟下二十四世也師所著有空谷集三十卷心宗洞達機辨峻儒釋通貫事理交融大理卿吳公誌之師存年五十二時自作塔銘於武林西湖之修吉山院名正傳有正傳十景之詠在集大明毒峯善禪師師諱本善祖鳳陽人隨任生於廣東之雷陽父姓吳母鍾氏稚小以佛事為兒戲十七歲出家初投源明和尚請益明示以無字公案正統八年入閩參無際師聞鐘聲有省次見蒙隱次見楚山次見月溪溪印可之從前打七掩關曉夜無怠歷盡百倍苦功乃得大徹復蒙古庭重授衣拂天順庚辰趙氏建西湖三塔寺請師開山繼興天目昭明繼興吳山寶蓮繼興南山甘露成化庚子掩關石屋寺壬寅慈雲嶺有山曰登雲寺曰天真僧宗綱請師興建事峻即掩關杜人事涵養陶汰有四十餘年祇掩關之句示寂後門人悟深戒新等輯師言論行實名昭明甘露天真三處語要錄云大明雪庭某禪師師號雪庭一號梅雪隱人籍貫浙省杭州府仁和父姓桂名徵母徐氏昆仲三人師最少以景泰丙子生毀齒喪父患痘風因得目疾數求出家十五尋師唯益邪解成化癸巳參休休翁於郡城仙林寺一見契合受無字公案十七祝髮日夜研究滯沈寂之境座元某勉使看教因閱楞嚴至一毫端上現寶王剎有疑後在江陰乾明寺忽覩萬佛閣金碧崢嶸於眉宇間偶會得毛端現剎之句弘治改元除夕聞鐘聲數年行履忽爾活脫信口偈云圓響心非聞大千同一照抹過上頭關更不存玄妙乙卯又隨休休翁於淨慈寺乃蒙印可所著有請益警進拈古頌古擬寒山和永明詩偈等凡二十卷號幻寄集行世
