front:
  text: 續武林西湖高僧事略正集起於晉止於宋元自後無續之者乃補入元季國初得五師焉而中峯本禪師相傳今吳山雲居菴有師所著麻履尚存然考之行狀誌銘及與廣錄曾無住持雲居之事不敢徇俗增補又正集中國一欽禪師始末皆在雙徑未見住武林西湖實跡似為可刪姑存之以俟再考所補五師雖一二誕生於元而出世涅槃大都在洪永間故獨以國朝標之嗣有作者可更續云雲棲沙門武林袾宏識續補諸師目錄大明性原朗禪師大明楚石琦禪師大明空谷隆禪師大明毒峯善禪師大明雪庭某禪師
